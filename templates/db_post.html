<!DOCTYPE html>
<html lang="en">
 {% set fname = 'assets/img/' + post.img_file %}
<head>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"
        crossorigin="anonymous"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ post.Title }}</title>

    <link rel="icon" type="image/x-icon"
          href="{{ url_for('static', filename='assets/favicon.ico') }}">

    <!-- Bootstrap Theme CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}"
          rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
        <div class="container px-4 px-lg-5">

            <a class="navbar-brand"
               href="{{ url_for('index') }}">
                The Blog Library
            </a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('index') }}">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('about') }}">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('search') }}">
                            Search Post
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('contact') }}">
                            Contact
                        </a>
                    </li>

                </ul>
            </div>

        </div>
    
    </nav>
    

    <!-- Header -->
    <header class="masthead"
        style="background-image: url('{{ url_for('static', filename=fname) }}'); min-height: 300px;">


        <div class="container position-relative px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">

                <div class="col-md-10 col-lg-8 col-xl-7">

                    <div class="post-heading">

                        <h1 class="text-white">
                            {{ post.Title }}
                        </h1>
                        <h2 class="subheading text-white">
                           You can add a subheading here
                        </h2>
                        <span class="text-white">
                            Posted on {{ post.date }} by Admin
                        </span>

                    </div>

                </div>

            </div>
        </div>
    </header>
    

    <!-- Post Content -->
    <article class="mb-5">
        <div class="container px-4 px-lg-5">

            <div class="row gx-4 gx-lg-5 justify-content-center">

                <div class="col-md-10 col-lg-8 col-xl-7">

                    <p style="font-size:20px;">
                        {{ post.content }}
                    </p>

                </div>

            </div>

        </div>
    </article>

<footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <ul class="list-inline text-center">
                            <li class="list-inline-item">
                                <a href="{{params['tw_url']}}" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-twitter fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                            <li class="list-inline-item">
                                <a href="{{params['fb_url']}}" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-facebook-f fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                            <li class="list-inline-item">
                                <a href="{{params['gh_url']}}" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                        </ul>
                </div>
            </div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="{{url_for('static', filename='js/scripts.js')}}"></script>
</body>
</html>
