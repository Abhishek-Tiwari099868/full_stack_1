<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>The Blog Library</title>
        <link rel="icon" type="image/x-icon" href="{{url_for('static', filename='assets/favicon.ico')}}" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{{url_for('static', filename='css/styles.css')}}" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
            <div class="container px-4 px-lg-5">

                <a class="navbar-brand" href="{{ url_for('index') }}">
                    The Blog Library
                </a>

                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarResponsive"
                        aria-controls="navbarResponsive"
                        aria-expanded="false"
                        aria-label="Toggle navigation">

                    Menu
                    <i class="fas fa-bars"></i>

                </button>

                <!-- ADD THIS -->
                <div class="collapse navbar-collapse" id="navbarResponsive">

                    <ul class="navbar-nav ms-auto py-4 py-lg-0">

                        <li class="nav-item">
                            <a class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('index') }}">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('logout') }}">
                                Logout
                            </a>
                        </li>

                    </ul>

                </div>
                <!-- END -->

            </div>
        </nav>
        <!-- Page Header-->
        <header class="masthead" style="background-image: url('{{url_for('static', filename='assets/img/home-bg.jpg')}}')">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="site-heading">
                            <h1>Admin Panel</h1>
                            <span class="subheading">Hello Admin ! Manage your blog content</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <!-- Main Content-->
        <div class="container ">
            <div class="row ">
                <div class="col-md-10 col-lg-8 col-xl-7">
                   <h1>
</div>
<div class="d-flex justify-content-between align-items-center mb-4">
    
    <h1 class="mb-0">Add/Edit Posts</h1>

    <div>
       <a href="/edit/0" class="btn btn-success">
    <i class="fas fa-plus"></i> Add Post
</a>

<a href="/logout" class="btn btn-outline-danger">
    <i class="fas fa-sign-out-alt"></i> Logout
</a>
    </div>

</div>
<h1>Upload Files here</h1>
<form action="/uploader" method="POST" enctype="multipart/form-data">

    <div class="mb-3">
        <label class="form-label">Select Image</label>
        <input type="file" class="form-control" name="img_file">
    </div>

    <button type="submit" class="btn btn-primary">
        <i class="fas fa-upload"></i> Submit
    </button>

</form>
<table class="table">
  <thead>
    <tr>
      <th scope="col">sr_no</th>
      <th scope="col">Title</th>
      <th scope="col">Date</th>
      <th scope="col">Edit</th>
      <th scope="col">Delete</th>
    </tr>
  </thead>
  <tbody>

    {%for post in posts %}

    <tr>
      <td>{{post.sr_no}}</td>
      <td>{{post.Title}}</td>
      <td>{{post.date}}</td>
      <td><a href="/edit/{{post.sr_no}}"><button class="btn btn-primary" type="button">Edit</button></a></td>
      <td><a href="/delete/{{post.sr_no}}"><button class="btn btn-primary" type="button">Delete</button></a></td>
    </tr>

    {%endfor%}
  </tbody>
</table>
                    
       
        
        <!-- Footer-->
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <ul class="list-inline text-center">
                            <li class="list-inline-item">
                                <a href="{{params['tw_url']}}" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-twitter fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                            <li class="list-inline-item">
                                <a href="{{params['fb_url']}}" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-facebook-f fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                            <li class="list-inline-item">
                                <a href="{{params['gh_url']}}" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                        </ul>
                </div>
            </div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="{{url_for('static', filename='js/scripts.js')}}"></script>
    </body>
</html>
