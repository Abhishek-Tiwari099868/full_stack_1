</div>
<div class="d-flex justify-content-between align-items-center mb-4">
    
    <h1 class="mb-0">Add/Edit Posts</h1>

    <div>
       <a href="/login" class="btn btn-success">
      Dashboard Home
</a>

<a href="/logout" class="btn btn-outline-danger">
    <i class="fas fa-sign-out-alt"></i> Logout
</a>
    </div>

</div>
 <form action="/edit/{{post.sr_no if post else 0}}" method="POST">
                                <div class="form-floating">
                                            <input class="form-control" id="Title" name="Title" type="text"  value="{{post.Title}} "required>
                                            <label for="Title">Title</label>
                                    
                                </div>
                                <div class="form-floating">
                                    <input class="form-control" id="tagline" name="tagline" type="text" value="{{post.tagline}}" required>
                                    <label for="tagline">Tagline</label>
                                </div>
                                <div class="form-floating">
                                    <input class="form-control" id="slug" name="slug" type="text" value="{{post.slug}}" required>
                                    <label for="slug">Slug</label>
                                </div>
                                <div class="form-floating">
                                    <textarea class="form-control" id="content" name="content"  required> {{post.content}}</textarea>
                                    <label for="content">Content</label>
                                    
                                </div>
                                <div class="form-floating">
                                    <input class="form-control" id="img_file" name="img_file" type="file" value="{{post.img_file}}" required>
                                    <label for="img_file">Image File</label>
                                    
                                </div>
                                <br />
                                <!-- Submit success message-->
                                <!---->
                                <!-- This is what your users will see when the form-->
                                <!-- has successfully submitted-->
                                    <div class="text-center mb-3">
                                
                                        <br />
                                    </div>
                            
                              
                               <button class="btn btn-primary text-uppercase" type="submit">submit</button>
                            </form>

                    
</div>
</div>
</div>
